<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Energy Saver - Pro Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 20px; text-align: center;}
        .container { max-width: 1000px; margin: auto; }
        .grid { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap;}
        .card { background: #1e293b; padding: 20px; border-radius: 12px; flex: 1; border: 1px solid #334155; min-width: 200px;}
        .value { font-size: 42px; font-weight: bold; color: #34d399; margin: 10px 0; transition: color 0.3s;}
        
        .danger { color: #ef4444 !important; }
        .warning { color: #f59e0b !important; }
        
        .chart-container, .controls { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 20px;}
        .controls { display: flex; justify-content: center; align-items: center; gap: 15px; flex-wrap: wrap; }
        input, button { padding: 10px; border-radius: 6px; font-size: 16px;}
        input { background: #0f172a; color: white; border: 1px solid #475569; width: 100px;}
        button { background: #38bdf8; color: #0f172a; cursor: pointer; border: none; font-weight: bold; transition: 0.2s;}
        button:hover { background: #0ea5e9; }
        .btn-export { background: #10b981; color: white;}
        .btn-export:hover { background: #059669; }
        .current-limit-box { font-size: 18px; color: #cbd5e1; font-weight: bold; border-right: 2px solid #334155; padding-right: 20px;}
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color: #38bdf8;">⚡ Energy Saver Dashboard</h1>
        <div class="grid">
            <div class="card">
                <h3>Струм</h3>
                <div class="value" id="power-val">0.00 кВт</div>
            </div>
            <div class="card">
                <h3>Температура</h3>
                <div class="value" id="temp-val">0.0 °C</div>
            </div>
            <div class="card">
                <h3>Статус</h3>
                <div class="value" id="status-val" style="font-size: 36px;">ОЧІКУВАННЯ</div>
            </div>
        </div>
        
        <div class="chart-container">
            <canvas id="powerChart" height="80"></canvas>
        </div>
        
        <div class="controls">
            <div class="current-limit-box">
                Поточний ліміт: <span id="current-limit" style="color: #f59e0b;">--</span> кВт
            </div>
            <label>Встановити новий:</label>
            <input type="number" id="limitInput" step="0.1" placeholder="Напр. 4.5">
            <button onclick="updateThreshold()">Застосувати</button>
            <div style="width: 20px;"></div>
            <button class="btn-export" onclick="window.location.href='http://127.0.0.1:5000/api/export'">📥 Завантажити CSV</button>
        </div>
    </div>
    
    <script>
        const ctx = document.getElementById('powerChart').getContext('2d');
        const powerChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Споживання (кВт)', data: [], borderColor: '#34d399', backgroundColor: 'rgba(52, 211, 153, 0.1)', fill: true, tension: 0.3 }] },
            options: { scales: { y: { min: 0, max: 7, grid: { color: '#334155' } }, x: { grid: { color: '#334155' } } }, plugins: { legend: { labels: { color: '#cbd5e1' } } } }
        });

        // Підключення до незалежного бекенду
        var socket = io.connect('http://127.0.0.1:5000');
        
        socket.on('update', function(data) {
            document.getElementById('power-val').innerText = data.power.toFixed(2) + " кВт";
            document.getElementById('temp-val').innerText = data.temperature.toFixed(1) + " °C";
            document.getElementById('current-limit').innerText = data.threshold.toFixed(1);
            
            var st = document.getElementById('status-val');
            var pw = document.getElementById('power-val');
            var temp = document.getElementById('temp-val');
            st.innerText = data.status;
            
            // Логіка 3 кольорів
            if (data.status === 'КРИТИЧНО') {
                st.className = "value danger";
                pw.className = "value danger";
                if(data.temperature >= 60.0) temp.className = "value danger";
            } else if (data.status === 'ПОПЕРЕДЖЕННЯ') {
                st.className = "value warning";
                pw.className = "value warning";
                temp.className = "value"; 
            } else {
                st.className = "value";
                pw.className = "value";
                temp.className = "value";
            }

            powerChart.data.labels.push(new Date().toLocaleTimeString());
            powerChart.data.datasets[0].data.push(data.power);
            if (powerChart.data.labels.length > 25) {
                powerChart.data.labels.shift(); powerChart.data.datasets[0].data.shift();
            }
            powerChart.update();
        });

        function updateThreshold() {
            var newVal = document.getElementById('limitInput').value;
            if (!newVal) return alert("Будь ласка, введіть число!");
            
            // Абсолютний шлях до API бекенду
            fetch('http://127.0.0.1:5000/api/threshold', {
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ threshold: parseFloat(newVal) })
            }).then(() => {
                alert('Ліміт успішно оновлено на ' + newVal + ' кВт!');
                document.getElementById('limitInput').value = '';
            }).catch(() => alert('Помилка оновлення ліміту!'));
        }
    </script>
</body>
</html>
